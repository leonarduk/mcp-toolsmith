name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: ${{ matrix.python-version }} / ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        check: [lint, typecheck, test]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and CI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run Ruff lint
        if: matrix.check == 'lint'
        run: python -m ruff check .

      - name: Run mypy strict type checks
        if: matrix.check == 'typecheck'
        run: python -m mypy mcp_toolsmith/

      - name: Run pytest with coverage gate
        if: matrix.check == 'test'
        run: python -m pytest --cov=mcp_toolsmith --cov-report=term-missing --cov-fail-under=80 tests
