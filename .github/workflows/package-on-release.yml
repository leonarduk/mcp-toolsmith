name: Publish package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build distribution artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify package metadata
        run: python -m twine check dist/*

      - name: Verify tag matches project version
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path
          import os
          import sys

          tag = os.environ["GITHUB_REF_NAME"]
          tag_version = tag[1:] if tag.startswith("v") else tag
          project_version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]

          if tag_version != project_version:
              print(
                  f"Tag/version mismatch: tag '{tag}' resolves to '{tag_version}' "
                  f"but pyproject.toml declares '{project_version}'.",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          print(f"Tag '{tag}' matches package version '{project_version}'.")
          PY

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/p/mcp-toolsmith
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

      - name: Verify installer command against TestPyPI
        env:
          EXPECTED_VERSION: ${{ github.ref_name }}
        run: |
          python -m venv .venv-testpypi
          . .venv-testpypi/bin/activate
          python -m pip install --upgrade pip
          expected_version="${EXPECTED_VERSION#v}"
          python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ "mcp-toolsmith==${expected_version}"
          installed_version="$(python -c "import importlib.metadata; print(importlib.metadata.version('mcp-toolsmith'))")"
          test "${installed_version}" = "${expected_version}"
          test "$(mcp-toolsmith --version)" = "mcp-toolsmith ${expected_version}"
          mcp-toolsmith --help >/dev/null

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: publish-testpypi
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-toolsmith
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release from tag
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-template.md
          files: dist/*
